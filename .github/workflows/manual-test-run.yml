name: Manual Test Run — Grant Pipeline

on:
  workflow_dispatch:
    inputs:
      min_match_score:
        description: 'Minimum grant match score (0-100)'
        required: false
        default: '55'
      dry_run:
        description: 'Dry run — skip email + Notion push'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  manual-grant-test:
    name: Manual Grant Pipeline Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (test)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_FROM_EMAIL: ${{ secrets.DIGEST_FROM_EMAIL }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          MIN_MATCH_SCORE: ${{ github.event.inputs.min_match_score }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          FOCUS_AREA: 'womens_health'
          RUN_CADENCE_DAYS: '14'
        run: python pipelines/biweekly_grant_run.py
